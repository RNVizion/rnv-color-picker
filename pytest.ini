# pytest configuration for RNV Color Picker.
#
# Two test sources coexist:
#   1. test_rnv_color_picker.py (project root) — 400 unittest-style tests.
#      pytest discovers and runs unittest.TestCase classes natively.
#   2. tests/ directory — new pytest-qt interaction tests starting Phase 2.
#
# Both can be invoked at once via `python run_tests.py`, or independently
# via `pytest test_rnv_color_picker.py` and `pytest tests/`.

[pytest]
# Make the project root importable so tests/ can resolve `core`, `ui`,
# and `utils` packages via `from core.foo import Bar` etc.
pythonpath = .

testpaths =
    tests
    test_rnv_color_picker.py

# pytest-qt: target PyQt6 specifically (auto-detect would also work, but
# being explicit avoids surprises if PySide ever ends up installed).
qt_api = pyqt6

# Suppress noisy warnings that aren't actionable.
# - DeprecationWarning: Python 3.13 deprecates several PyQt patterns; we
#   already use the modern ones, but transitive deps still trigger them.
# - ResourceWarning: tests intentionally leave temp files for setup speed;
#   `tempfile.mkdtemp()` cleanup runs at process exit.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning

# Strict markers prevents typos from silently passing as no-op markers.
addopts = --strict-markers -ra
